<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Popcorn Movie</title>
    <link rel="stylesheet" href="style.css">
    <script src="Moviedata_table" defer></script>
</head>
<body>

    <!-- Title -->
    <div class="title">
        <h1 id="title-text">Team Popcorn Movie</h1>
    </div>

    <!-- Links -->
    <div class="links">
        <a href="#">Home</a>
        <a href="#">Get Tickets</a>
        <a href="#">About Us</a>
        <a href="#">Menu/Food/Drinks</a>
    </div>

    <!-- Page layout -->
    <div class="page">


            <div>
                <table class="tablespace">
                    <tr>
                            <th>Name</th>
                            <th>Genre</th>
                            <th>Description</th>
                            <th>Showtime Start</th>
                            <th>Showtime End</th>
                    </tr>
                    <tbody id="movie">
                    </tbody>
                </table>
            </div>
            
    </div>
<div>
                <p> Enter the movie you want to add:</p>
                <form>
                    <label>Name: </label>
                    <input type="text" id="name">
                    <label>Genre: </label>
                    <input type="text" id="genre">
                    <label>Description: </label>
                    <input type="text"id="desc">
                    <label>Showtime start: </label>
                    <input type="datetime-local" id="showtime">
                    <label>Showtime End:</label>
                    <input type="datetime-local" id="endshowtime">
                    <button id="submit">Submit </button>
                    
                </form>
                
            </div>
</body>
</html>
